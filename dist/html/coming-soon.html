<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="keywords" content="">
<meta name="description" content="Yogo –  Responsive Yoga HTML Template">
<meta name="author" content="dreamzontheme">
<title>Yogo - Yoga Bootstrap Responsive Template</title>

  <!-- Favicon Icon-->
<link rel="icon" type="image/x-icon" href="../assets/images/logo/favicon.png">
<!-- Bootstrap Icons -->
<link rel="stylesheet" href="../assets/css/vendor/bootstrap-icons.css">
<!-- Animat Css-->
<link rel="stylesheet" href="../assets/css/vendor/animate.css">
<!-- Sal Css-->
<link rel="stylesheet" href="../assets/css/vendor/sal.css">
<!-- Bootstrap Css-->
<link rel="stylesheet" href="../assets/css/vendor/bootstrap.css">

  <!-- Custom Css-->
  <link rel="stylesheet" href="../assets/css/style.css">

</head>

<body>

  <!-- coming soon start-->
  <section class="coming-soon py-5 vh-100 d-md-flex align-items-center overflow-auto">
    <div class="container position-relative">
      <div class="row">
        <div class="col-12 col-md-9 col-lg-7 mx-auto" data-sal-delay="100" data-sal="fade-in" data-sal-duration="800">
          <div class="coming-detail text-white text-center">
            <h1 class="mb-3">We&apos;re Coming Soon</h1>
            <p class="fs-5 text-white">
              Our website is under construction. We&apos;ll be here soon with our new awesome site,
              subscribe to be notified.
            </p>
            <div class="countdown-wrap mt-4">
              <div class="row gy-4">
                <div class="col-sm-3 col-6">
                  <div class="countdown-grid text-white bg-primary rounded-3 p-4">
                    <h2 class="mb-0 day">180</h2>
                    <h3 class="mb-0 fs-6">Days</h3>
                  </div>
                </div>
                <div class="col-sm-3 col-6">
                  <div class="countdown-grid text-white bg-primary rounded-3 p-4">
                    <h2 class="mb-0 hour">06</h2>
                    <h3 class="mb-0 fs-6">Hours</h3>
                  </div>
                </div>
                <div class="col-sm-3 col-6">
                  <div class="countdown-grid text-white bg-primary rounded-3 p-4">
                    <h2 class="mb-0 minute">02</h2>
                    <h3 class="mb-0 fs-6">Minutes</h3>
                  </div>
                </div>
                <div class="col-sm-3 col-6">
                  <div class="countdown-grid text-white bg-primary rounded-3 p-4">
                    <h2 class="mb-0 second">42</h2>
                    <h3 class="mb-0 fs-6">Seconds</h3>
                  </div>
                </div>
              </div>
            </div>
            <form class="newsletter-form position-relative w-75 mx-auto mt-5">
              <div class="input-group rounded-2 overflow-hidden">
                <input class="form-control" type="email" placeholder="Enter your email" name="email" required>
                <button class="btn btn-primary rounded-0" type="submit">Subscribe</button>
              </div>
            </form>
            <ul class="social-list d-flex justify-content-center mt-5">
              <li>
                <a class="d-flex align-items-center justify-content-center rounded-circle" href="#!" aria-label="facebook">
                  <i class="bi bi-facebook"></i>
                </a>
              </li>
              <li class="ms-3">
                <a class="d-flex align-items-center justify-content-center rounded-circle" href="#!" aria-label="twitter">
                  <i class="bi bi-twitter-x"></i>
                </a>
              </li>
              <li class="ms-3">
                <a class="d-flex align-items-center justify-content-center rounded-circle" href="#!" aria-label="instagram">
                  <i class="bi bi-instagram"></i>
                </a>
              </li>
              <li class="ms-3">
                <a class="d-flex align-items-center justify-content-center rounded-circle" href="#!" aria-label="linkedin">
                  <i class="bi bi-linkedin"></i>
                </a>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </section>
  <!-- coming soon end-->

  <!-- Main jquery -->
<script src="../assets/js/jquery-3.7.1.min.js"></script>
<!-- Sal Js-->
<script src="../assets/js/sal.js"></script>
<!-- Scrollbar Js-->
<script src="../assets/js/smooth-scroll.js"></script>
<!-- Bootstrap Js-->
<script src="../assets/js/bootstrap.bundle.min.js"></script>
<!-- App Config Js-->
<script src="../assets/js/app-config.js"></script>

  <!-- counter down js-->
  <script src="../assets/js/countdown.js"></script>

  <!-- App js -->
  <script src="../assets/js/app.js"></script>

</body>

</html>
