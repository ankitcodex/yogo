@@include("../common/mainfiles.html")

<head>

  @@include("../common/metafiles.html")

  @@include("../common/linkfiles.html")

  <!-- Custom Css-->
  <link rel="stylesheet" href="../assets/css/style.css">

</head>

<body> 

  <!-- Login Start-->
  <section class="py-4 vh-100 d-lg-flex align-items-center overflow-auto">
    <div class="container">
      <div class="row">
        <div class="col-lg-6 offset-lg-3">
          <div class="codex-authbox border p-4 rounded-3">
            <div class="auth-header text-center mb-3">
              <div class="auth-icon login-list d-flex align-items-center justify-content-center rounded-circle mx-auto mb-2">
                <i class="bi bi-unlock"></i>
              </div>
              <h3>Reset Your Password </h3>
              <p>You&apos;ve Successfully Verified Your Account. Enter <br> New Passeord Below.</p>
            </div>
            <form action="#">
              <div class="row gy-3">
                <div class="col-md-12">
                  <label class="form-label">New Password</label>
                  <div class="input-group">
                    <input class="form-control showhide-password" type="password" placeholder="Enter Your New Password"
                      required="">
                      <span class="input-group-text bg-transparent text-light toggle-show bi bi-eye"></span>
                  </div>
                </div>
                <div class="col-md-12">
                  <label class="form-label">Confirm Password</label>
                  <div class="input-group">
                    <input class="form-control showhide-password" type="password" placeholder="Re Enter Your Password"
                      required="">
                      <span class="input-group-text bg-transparent text-light toggle-show bi bi-eye"></span>
                  </div>
                  <button class="btn btn-primary mt-4 d-block w-100 fs-5" type="submit">Update Password</button>  
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </section>
  <!-- Login End-->
 

  @@include("../common/scriptfiles.html")

  <!-- App js -->
  <script src="../assets/js/app.js"></script>

</body>

</html>
