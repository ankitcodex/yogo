@@include("../common/mainfiles.html")

<head>

  @@include("../common/metafiles.html")

  @@include("../common/linkfiles.html")

  <!-- Custom Css-->
  <link rel="stylesheet" href="../assets/css/style.css">

</head>

<body>

  <!-- Login Start-->
  <section class="py-4 vh-100 d-lg-flex align-items-center overflow-auto">
    <div class="container">
      <div class="row">
        <div class="col-lg-6 offset-lg-3">
          <div class="codex-authbox border p-4 rounded-3">
            <div class="auth-header text-center mb-3">
              <div class="auth-icon login-list d-flex align-items-center justify-content-center rounded-circle mx-auto mb-2">
                <i class="bi bi-envelope-open"></i>
              </div>
              <h3>Verify Your Email</h3>
              <p>Plase Enter The Verification Code We Sent <br> To formeto@example.Com</p>
            </div>
            <form onsubmit="onSubmit(event)" action="#">
              <div class="group-small auth-pin d-flex">
                <input class="form-control text-center code-input" type="text" required="">
                <input class="form-control text-center code-input ms-2" type="text" required="">
                <input class="form-control text-center code-input ms-2" type="text" required="">
                <input class="form-control text-center code-input ms-2" type="text" required="">
                <input class="form-control text-center code-input ms-2" type="text" required="">
                <input class="form-control text-center code-input ms-2" type="text" required="">
              </div>
              <button class="btn btn-primary mt-4 d-block w-100 fs-5" type="submit">Confirm</button>
            </form>
            <div class="auth-footer mt-3 text-center">
              <p>
                Dont Receive The Email ?
                <a class="text-primary" href="#"> Resend Email</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
  <!-- Login End-->


  @@include("../common/scriptfiles.html")

  <!-- App js -->
  <script src="../assets/js/app.js"></script>
  <script>
    const inputElements = [...document.querySelectorAll('input.code-input')]
      inputElements.forEach((ele,index)=>{
        ele.addEventListener('keydown',(e)=>{
          if(e.keyCode === 8 && e.target.value==='') inputElements[Math.max(0,index-1)].focus()
        })
        ele.addEventListener('input',(e)=>{
          const [first,...rest] = e.target.value
          e.target.value = first ?? ''
          const lastInputBox = index===inputElements.length-1
          const insertedContent = first!==undefined
          if(insertedContent && !lastInputBox) {
            inputElements[index+1].focus()
            inputElements[index+1].value = rest.join('')
            inputElements[index+1].dispatchEvent(new Event('input'))
          }
        })
      })
  </script> 

</body>

</html>
